<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的第一个 GitHub Pages 网站</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      color: white;
    }

    .card {
      width: min(90%, 720px);
      padding: 48px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      opacity: 0.92;
    }

    button {
      margin-top: 24px;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      background: white;
      color: #2563eb;
      font-weight: 700;
    }

    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>你好，GitHub Pages</h1>
    <p>这是我的第一个免费静态网站。</p>
    <p>不用服务器，也能上线，主打一个优雅白嫖。</p>
    <button onclick="alert('发布成功！')">点我试试</button>
  </div>
</body>
</html>
